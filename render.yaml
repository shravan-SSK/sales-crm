services:
  # ── Backend API (Node.js) ──────────────────────────────────────────────────
  - type: web
    name: sales-crm-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false          # Set this manually in the Render dashboard
      - key: GMAIL_REDIRECT_URI
        sync: false          # Set to: https://sales-crm-api.onrender.com/api/gmail/callback
    disk:
      name: crm-data
      mountPath: /data
      sizeGB: 1              # Persistent disk for SQLite ($7/month) — see note below

  # ── Frontend (React static site) ──────────────────────────────────────────
  - type: web
    name: sales-crm-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to: https://sales-crm-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
